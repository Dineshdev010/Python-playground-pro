<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Core Security Headers (Safe defaults, no CSP to prevent breakage) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <style>
      /* App Loader (renders before React + CSS load) */
      .pym-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #0d0f14;
        background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
        background-size: 32px 32px;
        background-position: center;
        transition: opacity 0.5s ease-out, transform 0.5s ease-out;
      }

      /* Add overlay gradient matching auth page */
      .pym-loader::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, rgba(37,99,235,0.15) 0%, #0d0f14 80%);
        pointer-events: none;
      }

      .pym-loader__card {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        transform: translateY(-20px);
      }

      .pym-loader__logo-container {
        position: relative;
        width: 88px;
        height: 88px;
      }

      .pym-loader__logo-glow {
        position: absolute;
        inset: -25px;
        background: conic-gradient(from 0deg, #3b82f6, #facc15, #3b82f6);
        border-radius: 50%;
        filter: blur(24px);
        opacity: 0.5;
        animation: pymLoaderSpin 4s linear infinite;
      }

      .pym-loader__logo {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
        border-radius: 20px;
        object-fit: contain;
        background: #0d0f14;
        border: 1px solid rgba(255,255,255,0.1);
        padding: 4px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        animation: pymLoaderPulse 2.5s ease-in-out infinite;
      }

      .pym-loader__text-container {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .pym-loader__title {
        color: #fff;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.5px;
        text-shadow: 0 0 20px rgba(255,255,255,0.3);
      }
      
      .pym-loader__title-pro {
        color: #3b82f6;
      }

      .pym-loader__terminal {
        color: #94a3b8;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        background: rgba(15, 23, 42, 0.8);
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid rgba(59,130,246,0.3);
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      }

      .pym-loader__cursor {
        display: inline-block;
        width: 8px;
        height: 16px;
        background-color: #facc15;
        margin-left: 8px;
        animation: pymLoaderBlink 1s step-end infinite;
      }

      .pym-loader.is-done {
        opacity: 0;
        transform: scale(1.02);
        pointer-events: none;
      }

      @keyframes pymLoaderSpin {
        100% { transform: rotate(360deg); }
      }

      @keyframes pymLoaderPulse {
        0%, 100% { transform: scale(1); border-color: rgba(59,130,246,0.2); }
        50% { transform: scale(1.06); border-color: rgba(250,204,21,0.4); }
      }

      @keyframes pymLoaderBlink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .pym-loader__logo-glow { animation: none; }
        .pym-loader__logo { animation: none; }
        .pym-loader { transition: none; }
      }
    </style>
    
    <!-- Primary SEO -->
    <title>PyMaster — Learn Python Programming | Free Lessons & Challenges</title>
    <meta name="description" content="Master Python programming from scratch with 25+ structured lessons, 180+ coding challenges, a built-in compiler, DSA mastery, and a reward system. Free and beginner-friendly." />

  <body>
    <!-- Full-screen loader matching Python IDE Theme -->
    <div id="app-loader" class="pym-loader" role="status" aria-live="polite" aria-label="Initializing Environment">
      <div class="pym-loader__card">
        <div class="pym-loader__logo-container">
          <div class="pym-loader__logo-glow"></div>
          <img src="/logo.png" alt="PyMaster" class="pym-loader__logo" width="88" height="88" decoding="async" fetchpriority="high" />
        </div>
        <div class="pym-loader__text-container">
          <div class="pym-loader__title">PyMaster <span class="pym-loader__title-pro">Pro</span></div>
          <div class="pym-loader__terminal" style="justify-content: space-between; min-width: 250px;">
            <span><span style="color: #4ade80; margin-right: 6px;">import</span> PyMaster as pm...<span class="pym-loader__cursor"></span></span>
            <span id="pym-pct" style="color: #facc15; font-weight: bold; margin-left: 12px; font-variant-numeric: tabular-nums;">0%</span>
          </div>
        </div>
      </div>
    </div>
    <script>
      (function() {
        var loader = document.getElementById('app-loader');
        var pctEl = document.getElementById('pym-pct');
        
        // Fast fake percentage counter for visual effect
        var pct = 0;
        var interval = setInterval(function() {
          pct += Math.floor(Math.random() * 12) + 4;
          if (pct >= 99) {
            pct = 99;
            clearInterval(interval);
          }
          if (pctEl) pctEl.innerText = pct + '%';
        }, 60);

        window.__hideLoader = function() {
          if (pctEl) pctEl.innerText = '100%';
          if (!loader) return;
          clearInterval(interval);
          
          // Slight delay at 100% before fading out
          setTimeout(function() {
            loader.classList.add('is-done');
            setTimeout(function() { try { loader.remove(); } catch (e) {} }, 500);
          }, 150);
        };
        
        // Failsafe auto-hide when window loads (if React doesn't remove it manually)
        window.addEventListener('load', function() {
          setTimeout(window.__hideLoader, 100);
        });
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
